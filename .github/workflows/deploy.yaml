name: Build & Check Next.js App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install Dependencies
        run: npm install

      # 4️⃣ Create env file (if needed)
      - name: Create .env file
        run: echo "MONGO_URI=${{ secrets.MONGODB_KEY }}" > .env

      # 5️⃣ Build project (IMPORTANT)
      - name: Build Project
        run: npm run build

      # 6️⃣ Success message
      - name: Build Success
        run: echo "✅ Build completed successfully"